<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        /* ============================================
           RESET E BASE
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            font-family: 'Poppins', Arial, sans-serif;
            color: #ffffff;
            min-height: 100vh;
        }

        /* ============================================
           CONTAINER PRINCIPAL
           ============================================ */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: clamp(20px, 4vw, 40px);
        }

        /* ============================================
           TÍTULO
           ============================================ */
        .container>h1 {
            font-size: clamp(28px, 4vw, 48px);
            font-weight: 700;
            margin-bottom: clamp(20px, 3vw, 40px);
            background: linear-gradient(135deg, #ffffff 0%, #6C63FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .container>h1 i {
            color: #6C63FF;
            -webkit-text-fill-color: #6C63FF;
            font-size: clamp(24px, 3vw, 36px);
        }

        /* ============================================
           CARDS - TOTALMENTE RESPONSIVOS
           ============================================ */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: clamp(15px, 2vw, 25px);
            margin-bottom: clamp(25px, 3vw, 40px);
        }

        .card {
            background: linear-gradient(145deg, #1a1a1a, #121212);
            padding: clamp(20px, 2.5vw, 30px);
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            min-width: 160px;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #6C63FF, #FF6B6B);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: rgba(108, 99, 255, 0.3);
            box-shadow: 0 12px 40px rgba(108, 99, 255, 0.1);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card .card-icon {
            font-size: clamp(28px, 3vw, 40px);
            color: #6C63FF;
            margin-bottom: 10px;
        }

        .card h3 {
            font-size: clamp(14px, 1.2vw, 18px);
            font-weight: 500;
            color: #888;
            margin-bottom: 8px;
        }

        .card h2 {
            font-size: clamp(32px, 4vw, 52px);
            font-weight: 700;
            background: linear-gradient(135deg, #6C63FF, #FF6B6B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ============================================
           TABELA - RESPONSIVA
           ============================================ */
        .table-wrapper {
            background: #111111;
            border-radius: 16px;
            padding: clamp(10px, 1.5vw, 20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        table thead {
            background: #1a1a1a;
        }

        table th {
            padding: clamp(12px, 1.5vw, 18px) clamp(10px, 1.5vw, 20px);
            text-align: left;
            font-weight: 600;
            font-size: clamp(12px, 1vw, 15px);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6C63FF;
            border-bottom: 2px solid #2a2a2a;
            white-space: nowrap;
        }

        table td {
            padding: clamp(10px, 1.2vw, 16px) clamp(10px, 1.5vw, 20px);
            border-bottom: 1px solid #1e1e1e;
            font-size: clamp(13px, 0.9vw, 15px);
            color: #cccccc;
            vertical-align: middle;
        }

        table tbody tr {
            transition: all 0.3s ease;
        }

        table tbody tr:hover {
            background: #1a1a1a;
            transform: scale(1.002);
        }

        table tbody tr:last-child td {
            border-bottom: none;
        }

        /* Badge para ID */
        .id-badge {
            display: inline-block;
            background: rgba(108, 99, 255, 0.15);
            color: #6C63FF;
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: clamp(11px, 0.8vw, 13px);
        }

        /* Status de mensagem */
        .msg-preview {
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            color: #aaa;
        }

        .msg-preview:hover {
            white-space: normal;
            overflow: visible;
            background: #1a1a1a;
            padding: 4px 8px;
            border-radius: 4px;
            position: relative;
            z-index: 10;
        }

        /* Data */
        .date-badge {
            color: #666;
            font-size: clamp(11px, 0.8vw, 13px);
            white-space: nowrap;
        }

        /* ============================================
           LOADING / EMPTY STATE
           ============================================ */
        .loading-state,
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .loading-state i,
        .empty-state i {
            font-size: 40px;
            color: #6C63FF;
            margin-bottom: 15px;
            display: block;
        }

        /* ============================================
           SCROLLBAR PERSONALIZADA
           ============================================ */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #111;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #6C63FF;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #5a52d5;
        }

        /* ============================================
           RESPONSIVIDADE
           ============================================ */

        /* Tablets e telas médias */
        @media (max-width: 992px) {
            .cards {
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            }

            table {
                min-width: 600px;
            }
        }

        /* Mobile */
        @media (max-width: 768px) {
            body {
                padding: 0;
            }

            .container {
                padding: 16px;
            }

            .container>h1 {
                font-size: 24px;
            }

            .cards {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 12px;
            }

            .card {
                padding: 16px;
                min-width: 120px;
            }

            .card h2 {
                font-size: 28px;
            }

            .table-wrapper {
                padding: 8px;
                border-radius: 12px;
            }

            table {
                min-width: 500px;
            }

            table th {
                font-size: 11px;
                padding: 10px 8px;
            }

            table td {
                font-size: 12px;
                padding: 10px 8px;
            }

            .id-badge {
                font-size: 10px;
                padding: 2px 8px;
            }

            .date-badge {
                font-size: 10px;
            }

            .msg-preview {
                max-width: 120px;
            }
        }

        /* Mobile pequeno */
        @media (max-width: 480px) {
            .container {
                padding: 12px;
            }

            .container>h1 {
                font-size: 20px;
                gap: 10px;
            }

            .container>h1 i {
                font-size: 20px;
            }

            .cards {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .card {
                padding: 14px 10px;
                min-width: auto;
            }

            .card .card-icon {
                font-size: 22px;
            }

            .card h3 {
                font-size: 11px;
            }

            .card h2 {
                font-size: 24px;
            }

            .table-wrapper {
                padding: 4px;
                border-radius: 8px;
            }

            table {
                min-width: 420px;
            }

            table th {
                font-size: 10px;
                padding: 8px 6px;
                letter-spacing: 0;
            }

            table td {
                font-size: 11px;
                padding: 8px 6px;
            }

            .id-badge {
                font-size: 9px;
                padding: 1px 6px;
            }

            .date-badge {
                font-size: 9px;
            }

            .msg-preview {
                max-width: 80px;
            }
        }

        /* ============================================
           ANIMAÇÕES
           ============================================ */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            animation: fadeInUp 0.6s ease forwards;
        }

        .card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .card:nth-child(2) {
            animation-delay: 0.2s;
        }

        .card:nth-child(3) {
            animation-delay: 0.3s;
        }

        .card:nth-child(4) {
            animation-delay: 0.4s;
        }

        .table-wrapper {
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.2s;
            opacity: 0;
        }

        /* ============================================
           MENSAGEM DE FEEDBACK
           ============================================ */
        #feedback-message {
            margin-top: 15px;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 500;
            display: none;
        }

        #feedback-message.success {
            display: block;
            background: rgba(46, 213, 115, 0.15);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.3);
        }

        #feedback-message.error {
            display: block;
            background: rgba(255, 71, 87, 0.15);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.3);
        }

        /* ============================================
           BOTÃO DE RECARREGAR
           ============================================ */
        .reload-btn {
            background: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
        }

        .reload-btn:hover {
            background: #2a2a2a;
            border-color: #6C63FF;
            color: white;
        }

        .reload-btn i {
            font-size: 14px;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            .header-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .reload-btn {
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header-actions">
            <h1><i class="fas fa-chart-line"></i> Dashboard</h1>
            <button class="reload-btn" onclick="loadContacts()">
                <i class="fas fa-sync-alt"></i> Atualizar
            </button>
        </div>

        <div class="cards">
            <div class="card">
                <div class="card-icon"><i class="fas fa-users"></i></div>
                <h3>Total de Cadastros</h3>
                <h2 id="totalContacts">0</h2>
            </div>
            <div class="card">
                <div class="card-icon"><i class="fas fa-user-plus"></i></div>
                <h3>Novos Hoje</h3>
                <h2 id="todayContacts">0</h2>
            </div>
            <div class="card">
                <div class="card-icon"><i class="fas fa-calendar-week"></i></div>
                <h3>Esta Semana</h3>
                <h2 id="weekContacts">0</h2>
            </div>
            <div class="card">
                <div class="card-icon"><i class="fas fa-envelope"></i></div>
                <h3>Mensagens</h3>
                <h2 id="totalContacts">0</h2>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Telefone</th>
                        <th>Mensagem</th>
                        <th>Data</th>
                    </tr>
                </thead>
                <tbody id="tableData">
                    <tr>
                        <td colspan="6" class="loading-state">
                            <i class="fas fa-spinner fa-spin"></i>
                            Carregando dados...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div id="feedback-message"></div>
    </div>

    <script>
        async function loadContacts() {
            const tbody = document.getElementById("tableData");
            const feedback = document.getElementById("feedback-message");

            // Mostra loading
            tbody.innerHTML = `
                <tr>
                    <td colspan="6" class="loading-state">
                        <i class="fas fa-spinner fa-spin"></i>
                        Carregando dados...
                    </td>
                </tr>
            `;

            feedback.style.display = 'none';

            try {
                const response = await fetch("http://localhost:3000/api/contacts");

                if (!response.ok) {
                    throw new Error(`Erro HTTP: ${response.status}`);
                }

                const result = await response.json();

                // Atualiza total
                document.getElementById("totalContacts").textContent = result.total || 0;

                // Atualiza contagens adicionais
                const today = new Date().toDateString();
                let todayCount = 0;
                let weekCount = 0;

                if (result.data && result.data.length > 0) {
                    result.data.forEach(contact => {
                        const date = new Date(contact.created_at);
                        const contactDate = date.toDateString();

                        if (contactDate === today) {
                            todayCount++;
                        }

                        const weekAgo = new Date();
                        weekAgo.setDate(weekAgo.getDate() - 7);
                        if (date >= weekAgo) {
                            weekCount++;
                        }
                    });
                }

                document.getElementById("todayContacts").textContent = todayCount;
                document.getElementById("weekContacts").textContent = weekCount;

                // Preenche tabela
                tbody.innerHTML = "";

                if (result.data && result.data.length > 0) {
                    result.data.forEach(contact => {
                        const date = new Date(contact.created_at);
                        const formattedDate = date.toLocaleString('pt-BR', {
                            day: '2-digit',
                            month: '2-digit',
                            year: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        });

                        const messageText = contact.message || 'Sem mensagem';

                        tbody.innerHTML += `
                            <tr>
                                <td><span class="id-badge">#${contact.id}</span></td>
                                <td><strong>${contact.fullname || 'N/A'}</strong></td>
                                <td><a href="mailto:${contact.email}" style="color: #6C63FF; text-decoration: none;">${contact.email || 'N/A'}</a></td>
                                <td>${contact.phone || 'N/A'}</td>
                                <td><span class="msg-preview" title="${messageText}">${messageText}</span></td>
                                <td><span class="date-badge">${formattedDate}</span></td>
                            </tr>
                        `;
                    });
                } else {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6" class="empty-state">
                                <i class="fas fa-inbox"></i>
                                Nenhum contato cadastrado ainda.
                            </td>
                        </tr>
                    `;
                }

                // Feedback de sucesso
                feedback.textContent = `✅ ${result.total || 0} contatos carregados com sucesso!`;
                feedback.className = 'success';
                feedback.style.display = 'block';

                // Esconde feedback após 3 segundos
                setTimeout(() => {
                    feedback.style.display = 'none';
                }, 3000);

            } catch (error) {
                console.error('Erro ao carregar contatos:', error);

                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="empty-state">
                            <i class="fas fa-exclamation-triangle" style="color: #ff4757;"></i>
                            Erro ao carregar dados. Verifique o servidor.
                            <br>
                            <small style="color: #666; display: block; margin-top: 8px;">${error.message}</small>
                        </td>
                    </tr>
                `;

                feedback.textContent = '❌ Erro ao carregar dados. Verifique o servidor.';
                feedback.className = 'error';
                feedback.style.display = 'block';
            }
        }

        // Carrega automaticamente ao abrir a página
        document.addEventListener('DOMContentLoaded', loadContacts);

        // Recarrega a cada 30 segundos
        setInterval(loadContacts, 30000);
    </script>

</body>

</html>
