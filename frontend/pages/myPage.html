        <p>Preencha o formulário abaixo e fale comigo pelo WhatsApp.</p>

        <form id="conversation">

                <label>Nome Completo</label>
                <input type="text" id="fullname" placeholder="Digite o seu nome" required>

            </div>

            <div class="inputBox">
                <label>Telefone</label>
                <input type="tel" id="phone" placeholder="+258 84 000 0000">
            </div>

            <div class="inputBox">
                <label>Mensagem</label>
                <textarea id="message" rows="5" placeholder="Como posso ajudar?" required></textarea>
            </div>

            <button type="submit" class="sendBtn">
                <i class="fa-brands fa-whatsapp"></i>
